name: nazer_app
description: NAZER Speed Monitoring Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.32.3
  permission_handler: ^11.3.1

  # State management & routing
  provider: ^6.1.2
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Maps & charts
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.68.0

  # Networking
  dio: ^5.4.3+1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts: []