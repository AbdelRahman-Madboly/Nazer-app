name: nazer_app
description: NAZER Speed Monitoring Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.32.3
  permission_handler: ^11.3.1

  # State management & navigation
  provider: ^6.1.2
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.68.0

  # Networking
  dio: ^5.4.3+1

  # Notifications — Phase 6D
  # Requires coreLibraryDesugaring in android/app/build.gradle.kts (see below)
  flutter_local_notifications: ^17.2.2

  # Date formatting — Phase 6D
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true